name: Tests & Quality

# Gatilho automático (push/pull_request) desativado temporariamente —
# o workflow está falhando em todos os pushes e gerando e-mail de
# notificação a cada commit. Rode manualmente via aba Actions no
# GitHub ("Run workflow") quando for investigar/corrigir os testes.
on:
  workflow_dispatch:

jobs:
  unit-and-component-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit & component tests
        run: npm run test:run

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30

  lighthouse-performance:
    name: Lighthouse Performance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Start dev server
        run: |
          npm run dev:front &
          sleep 5

      - name: Run Lighthouse
        run: npm run test:performance

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-results
          path: lighthouse-results/

  lint-and-types:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript
        run: npm run lint

      - name: Check test files
        run: npm test -- --checkOnly

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [unit-and-component-tests, e2e-tests]

    if: always()

    steps:
      - name: Check unit test status
        if: ${{ needs.unit-and-component-tests.result == 'failure' }}
        run: exit 1

      - name: Check E2E test status
        if: ${{ needs.e2e-tests.result == 'failure' }}
        run: exit 1

      - name: All tests passed ✅
        run: echo "All quality gates passed!"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-and-component-tests, e2e-tests, lint-and-types]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "=== TEST SUMMARY ==="
          echo "Unit & Component Tests: ${{ needs.unit-and-component-tests.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Lint & Types: ${{ needs.lint-and-types.result }}"

          if [[ "${{ needs.unit-and-component-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-and-types.result }}" == "failure" ]]; then
            echo "❌ Some tests failed"
            exit 1
          fi

          echo "✅ All tests passed!"
